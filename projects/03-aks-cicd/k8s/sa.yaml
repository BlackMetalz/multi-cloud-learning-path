apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-sa
  namespace: default
  annotations:
    # REPLACE_WL_CLIENT_ID is sed-substituted from `terraform output -raw workload_identity_client_id`.
    # Maps this K8s SA to the Azure UAMI via the federated credential created in identity.tf.
    azure.workload.identity/client-id: REPLACE_WL_CLIENT_ID
